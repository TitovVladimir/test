services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DATABASE_URL: file:./data/taskmanager.db
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 3001
      AUTH_PASSWORD: ${AUTH_PASSWORD:-tasks2024}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      ZHIPU_MODEL: ${ZHIPU_MODEL:-GLM-5-Turbo}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-https://api.z.ai/api/anthropic}
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/docs').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
